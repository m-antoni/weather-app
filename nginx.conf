# ==============================================================================
# NGINX REACTION APPLICATION CONFIGURATION
# 
# SUMMARY OF OPERATIONS:
# 1. Network Handling: Sets up a standard worker process limit of 1024 connections.
# 2. Performance & Assets: Enables 'sendfile' for fast disk-to-network transfers 
#    and includes 'mime.types' to prevent JavaScript/CSS from breaking in browsers.
# 3. Routing Engine: Listens on port 8080. Uses the 'try_files' directive to route 
#    all non-file requests straight to index.html, enabling React Router to manage 
#    page transitions smoothly without hitting 404 errors on page refresh.
# ==============================================================================

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       8080;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            try_files $uri $uri/ /index.html;
        }

        # Handle backend/server errors gracefully
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}

# Nginx configuration for serving a React (SPA) on Google Cloud Run
# 
# Notes:
# - Listens on port 8080 (Cloud Run's default expected port)
# - Serves static files from /usr/share/nginx/html (React build output)
# - The location block handles React Router (Client-side routing) by 
#   redirecting non-existent paths to index.html
# - This configuration is optimized for "Scale-to-Zero" environments
# - Successfully prevents the "Container failed to start" health check error


