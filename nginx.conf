# Nginx configuration for serving a React (SPA)
# 
# Notes:
# - Listens on port 80
# - Serves static files from /usr/share/nginx/html (React build output)
# - The location block ensures React Router works by serving index.html
#   for any routes that do not exist as a static file
# - This file is only used inside your Docker container (Render deployment)

server {
    listen 80;
    root /usr/share/nginx/html;

    location / {
        try_files $uri /index.html;
    }
}