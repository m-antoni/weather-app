# ==============================================================================
# CONTAINER MANAGEMENT GUIDE
# 
# 1. START / REBUILD CONTAINER
#    docker compose up -d --build
#    * Always use '--build' when changing environment variables or source code 
#      to force Nginx to recompile the static production assets.
#
# 2. VIEW APP LOGS
#    docker compose logs -f
#    * Streams Nginx server logs in real-time. Press Ctrl + C to exit log view 
#      without stopping the application.
#
# 3. ACCESS INTERACTIVE TERMINAL (GO INSIDE CONTAINER)
#    docker compose exec weather-app sh
#    * Opens a shell terminal inside the running Nginx container. Type 'exit' 
#      to disconnect.
#
# 4. MONITOR RUNNING STATUS
#    docker compose ps
#
# 5. STOP CONTAINER
#    docker compose down
#
# NOTE: Ensure a local '.env' file containing your REACT_APP_API_KEY exists 
#       in this directory before running the commands above.
# ==============================================================================

version: "3.8" 

services:
  weather-app:
    build:
      context: .
      dockerfile: Dockerfile 
      args:
        # This grabs the key from your local machine/.env file and passes it to the build stage
        - REACT_APP_API_KEY=${REACT_APP_API_KEY}
    ports:
      - "8080:8080"          # Maps port 8080 on your machine to port 8080 in Nginx