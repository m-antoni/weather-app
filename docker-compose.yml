version: "3.8" 

services:
  weather-app:  # Name of the service / container
    build:
      context: .             # Directory to use as Docker build context (current folder)
      dockerfile: Dockerfile.dev  # Use this Dockerfile for development mode
    ports:
      - "3000:3000"          # Map port 3000 in container to port 3000 on host
    volumes:
      - .:/app               # Mount current directory into /app inside container for live reload
      - /app/node_modules    # Preserve container's node_modules to avoid overwriting with host
    environment:
      - CHOKIDAR_USEPOLLING=true  # Enable polling for file watching (helps on Windows)
    stdin_open: true         # Keep STDIN open, allows interactive mode (optional)
    tty: true                # Allocate a pseudo-TTY, useful for interactive processes