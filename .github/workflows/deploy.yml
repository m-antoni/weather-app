name: Deploy Dockerized React App to AWS EC2

on:
  push:
    branches:
      - feature/aws-ec2-deploy

jobs:  
 build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Source code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/weather-app:ec2
        build-args: |
            REACT_APP_API_KEY=${{ secrets.REACT_APP_API_KEY }}
    
    - name: Create Deploy Directory
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mkdir -p ~/deploy

    - name: Copy Deployment Files to AWS EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "deploy/"
        target: "/home/ubuntu/deploy/"

    - name: SSH and Run Deployment Script on AWS EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: sh ~/deploy/deploy.sh